<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="referrer" content="no-referrer" />

  <title>Custom Hyperlinks</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">PERSONAL DASHBOARD</p>
      <h1>Custom Hyperlinks</h1>
      <p id="last-updated" class="last-updated">データを読み込んでいます</p>
    </div>

    <button id="reload-button" class="reload-button" type="button">
      再読み込み
    </button>
  </header>

  <main class="page-shell">
    <section id="status-panel" class="status-panel" aria-live="polite">
      読み込み中です。
    </section>

    <section id="pinned-section" class="link-section pinned-section" hidden>
      <div class="section-heading">
        <h2>ピン留め</h2>
        <span id="pinned-count" class="section-count"></span>
      </div>
      <div id="pinned-grid" class="card-grid"></div>
    </section>

    <div id="category-container"></div>
  </main>

  <template id="link-card-template">
    <a class="link-card" target="_blank" rel="noopener noreferrer">
      <div class="icon-wrap">
        <img class="link-icon" alt="" loading="lazy" />
      </div>

      <div class="card-body">
        <div class="card-title-row">
          <h3 class="card-title"></h3>
          <span class="pin-mark" aria-label="ピン留め">★</span>
        </div>

        <p class="card-description"></p>
        <p class="card-domain"></p>
      </div>
    </a>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
